<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'self'; img-src https: data:;" />
<style>
  /* ============================================================
     Aqua — премиальный «водный» интерфейс.
     Слои глубины: ambient-свечение → матовое стекло → контент.
     ============================================================ */
  :root {
    /* глубокий чернильно-синий грунт с холодным биасом */
    --ink: #0a0c12;
    --ink-2: #0d1018;
    --text: #eaeef6;
    --muted: #7f889c;
    --muted-2: #5a6274;

    /* стекло: полупрозрачные заливки, сквозь них видно свечение */
    --glass: rgba(255, 255, 255, 0.045);
    --glass-hi: rgba(255, 255, 255, 0.08);
    --glass-line: rgba(255, 255, 255, 0.09);
    --glass-line-hi: rgba(255, 255, 255, 0.16);
    --top-sheen: rgba(255, 255, 255, 0.06);

    /* акцент — аква→индиго */
    --aqua: #46d3d8;
    --indigo: #6a8bff;
    --accent-grad: linear-gradient(135deg, #4fe0e0 0%, #5b9cff 100%);
    --accent-soft: rgba(70, 211, 216, 0.16);

    /* цветные «орбы» ambient-фона */
    --orb-a: rgba(70, 211, 216, 0.28);
    --orb-b: rgba(106, 139, 255, 0.22);

    --shadow-lift: 0 10px 30px -12px rgba(0, 0, 0, 0.55);
    --radius-pill: 19px;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --ink: #eef1f7;
      --ink-2: #e7ebf3;
      --text: #141821;
      --muted: #5c6577;
      --muted-2: #8b93a4;
      --glass: rgba(255, 255, 255, 0.6);
      --glass-hi: rgba(255, 255, 255, 0.85);
      --glass-line: rgba(20, 24, 33, 0.08);
      --glass-line-hi: rgba(20, 24, 33, 0.16);
      --top-sheen: rgba(255, 255, 255, 0.9);
      --aqua: #0d9ca1;
      --indigo: #3f63d6;
      --accent-grad: linear-gradient(135deg, #17b8bd 0%, #3f7bf0 100%);
      --accent-soft: rgba(13, 156, 161, 0.12);
      --orb-a: rgba(70, 211, 216, 0.35);
      --orb-b: rgba(106, 139, 255, 0.3);
      --shadow-lift: 0 10px 30px -14px rgba(40, 60, 110, 0.4);
    }
  }
  :root[data-theme="dark"] { color-scheme: dark; }
  :root[data-theme="light"] { color-scheme: light; }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font: 13px/1.4 -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    color: var(--text);
    background: var(--ink);
    -webkit-user-select: none;
    user-select: none;
    -webkit-font-smoothing: antialiased;
  }

  /* ---- Ambient-свечение: медленно дышащие цветные орбы за панелью ---- */
  #glow {
    position: fixed;
    inset: -40% -20% auto -20%;
    height: 320px;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(420px 260px at 16% 0%, var(--orb-a), transparent 70%),
      radial-gradient(460px 280px at 82% 8%, var(--orb-b), transparent 72%);
    filter: blur(6px);
    animation: drift 22s ease-in-out infinite alternate;
  }
  @keyframes drift {
    0%   { transform: translate3d(-3%, -2%, 0) scale(1); }
    100% { transform: translate3d(4%, 3%, 0) scale(1.08); }
  }

  #chrome {
    position: relative;
    z-index: 1;
    -webkit-app-region: drag;
    background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent 70%);
    border-bottom: 1px solid var(--glass-line);
  }
  button, input, .tab { -webkit-app-region: no-drag; }

  /* ---- Ряд вкладок ---- */
  #tabstrip {
    display: flex;
    align-items: flex-end;
    gap: 5px;
    height: 42px;
    padding: 8px 10px 0 84px; /* место под «светофор» macOS слева */
  }
  .tab {
    display: flex;
    align-items: center;
    gap: 8px;
    max-width: 220px;
    min-width: 48px;
    height: 33px;
    padding: 0 8px 0 13px;
    border-radius: 12px 12px 2px 2px;
    color: var(--muted);
    background: transparent;
    border: 1px solid transparent;
    cursor: default;
    transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
    animation: tab-in 0.22s cubic-bezier(0.2, 0.9, 0.3, 1);
  }
  @keyframes tab-in { from { opacity: 0; transform: translateY(3px) scale(0.96); } }
  .tab:hover { background: var(--glass); color: var(--text); }
  .tab.active {
    color: var(--text);
    background: var(--glass-hi);
    border-color: var(--glass-line);
    box-shadow: 0 -1px 0 var(--top-sheen) inset, var(--shadow-lift);
  }
  .tab .title {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 12.5px;
    font-weight: 450;
  }
  .tab .ico { width: 13px; height: 13px; flex: none; }
  .tab .ico.spinner {
    border: 2px solid var(--accent-soft);
    border-top-color: var(--aqua);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  .tab .close {
    width: 19px; height: 19px; flex: none;
    border: none; border-radius: 6px;
    background: transparent; color: inherit;
    font-size: 15px; line-height: 1;
    opacity: 0; cursor: default;
    display: grid; place-items: center;
    transition: opacity 0.15s, background 0.15s;
  }
  .tab:hover .close { opacity: 0.6; }
  .tab .close:hover { opacity: 1; background: var(--glass-line-hi); }
  #newtab {
    width: 31px; height: 31px; flex: none;
    border: none; border-radius: 9px;
    background: transparent; color: var(--muted);
    font-size: 20px; font-weight: 300; cursor: default;
    display: grid; place-items: center;
    transition: background 0.16s, color 0.16s, transform 0.16s;
  }
  #newtab:hover { background: var(--glass); color: var(--text); }
  #newtab:active { transform: scale(0.92); }

  /* ---- Ряд инструментов: матовое стекло на свечении ---- */
  #toolbar {
    position: relative;
    display: flex;
    align-items: center;
    gap: 7px;
    height: 50px;
    padding: 0 13px;
    background: var(--glass);
    backdrop-filter: blur(22px) saturate(1.6);
    -webkit-backdrop-filter: blur(22px) saturate(1.6);
    box-shadow: 0 1px 0 var(--top-sheen) inset;
  }
  .navbtn {
    width: 33px; height: 33px; flex: none;
    border: none; border-radius: 10px;
    background: transparent; color: var(--text);
    cursor: default;
    display: grid; place-items: center;
    transition: background 0.16s, opacity 0.16s, transform 0.12s;
  }
  .navbtn:hover { background: var(--glass-hi); }
  .navbtn:active { transform: scale(0.9); }
  .navbtn:disabled { opacity: 0.25; }
  .navbtn svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 1.9; stroke-linecap: round; stroke-linejoin: round; }

  /* Адресная строка — стеклянная «пилюля» */
  #address {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 9px;
    height: 36px;
    padding: 0 6px 0 15px;
    border-radius: var(--radius-pill);
    background: var(--glass);
    border: 1px solid var(--glass-line);
    box-shadow: 0 1px 0 var(--top-sheen) inset;
    transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
  }
  #address:hover { background: var(--glass-hi); }
  #address:focus-within {
    background: var(--glass-hi);
    border-color: transparent;
    box-shadow: 0 0 0 2px var(--aqua), 0 0 0 6px var(--accent-soft), 0 1px 0 var(--top-sheen) inset;
  }
  #lock { width: 13px; height: 13px; flex: none; color: var(--muted-2); transition: color 0.2s; }
  #lock.secure { color: var(--aqua); }
  #url {
    flex: 1;
    border: none; outline: none; background: transparent;
    color: var(--text); font-size: 13.5px; letter-spacing: 0.01em;
    -webkit-user-select: text; user-select: text;
  }
  #url::placeholder { color: var(--muted-2); }
  /* фирменный чип «Aqua» с градиентом */
  #shield {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 600;
    color: #eafcff;
    padding: 5px 11px 5px 9px; border-radius: 15px;
    background: var(--accent-grad);
    flex: none;
    letter-spacing: 0.03em;
    box-shadow: 0 3px 10px -3px var(--accent-soft), 0 1px 0 rgba(255,255,255,0.25) inset;
  }
  #shield svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; }

  /* ---- Тонкая градиентная полоса загрузки под панелью ---- */
  #progress {
    position: absolute; left: 0; right: 0; bottom: -1px; height: 2px;
    overflow: hidden; opacity: 0;
    transition: opacity 0.3s;
  }
  #progress.loading { opacity: 1; }
  #progress::before {
    content: ""; position: absolute; inset: 0;
    width: 40%;
    background: linear-gradient(90deg, transparent, var(--aqua), var(--indigo), transparent);
    animation: slide 1.1s ease-in-out infinite;
  }
  @keyframes slide { 0% { left: -40%; } 100% { left: 100%; } }

  @keyframes spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
</style>
</head>
<body>
  <div id="glow"></div>
  <div id="chrome">
    <div id="tabstrip">
      <button id="newtab" title="Новая вкладка">+</button>
    </div>
    <div id="toolbar">
      <button class="navbtn" id="back" title="Назад" disabled>
        <svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg>
      </button>
      <button class="navbtn" id="forward" title="Вперёд" disabled>
        <svg viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
      </button>
      <button class="navbtn" id="reload" title="Обновить">
        <svg viewBox="0 0 24 24"><path d="M20 11a8 8 0 10-2.3 5.7M20 4v5h-5"/></svg>
      </button>
      <div id="address">
        <svg id="lock" class="secure" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a5 5 0 00-5 5v3H6a2 2 0 00-2 2v7a2 2 0 002 2h12a2 2 0 002-2v-7a2 2 0 00-2-2h-1V7a5 5 0 00-5-5zm3 8H9V7a3 3 0 016 0v3z"/></svg>
        <input id="url" type="text" placeholder="Поиск или адрес сайта" spellcheck="false" autocomplete="off" />
        <span id="shield" title="Весь трафик идёт через ваш сервер">
          <svg viewBox="0 0 24 24"><path d="M12 3l7 3v5c0 4.5-3 8-7 10-4-2-7-5.5-7-10V6l7-3z"/></svg>
          Aqua
        </span>
      </div>
      <div id="progress"></div>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
