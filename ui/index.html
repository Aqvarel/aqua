<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'self'; img-src https: data:;" />
<style>
  /* ============================================================
     Aqua — one. Студийная тёмная эстетика: боковая панель, spaces-рейл,
     тонкие волосяные линии, моноширинные микро-подписи, мятный акцент.
     Дизайн перенесён из Claude Design «Aqua Browser».
     ============================================================ */
  :root {
    --void: #070808;      /* самый тёмный фон окна */
    --win: #0b0c0d;       /* корпус */
    --page: #0f1112;      /* область страницы */
    --hi: #e9ecea;        /* яркий текст */
    --mid: #9aa09d;       /* средний текст */
    --low: #565b58;       /* приглушённый */
    --aq: #7ee7c4;        /* акцент (мятный) */
    --line: rgba(255,255,255,.07);
    --line-soft: rgba(255,255,255,.05);
    --line-hi: rgba(255,255,255,.1);
    --fill: rgba(255,255,255,.04);
    --fill-hi: rgba(255,255,255,.06);
    --good: #7ee7c4;
    --bad: #e8908a;
    --sans: 'Helvetica Neue', Helvetica, Arial, -apple-system, system-ui, sans-serif;
    --mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  }
  :root[data-theme="light"] { color-scheme: light; }
  :root[data-theme="dark"] { color-scheme: dark; }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font: 13px/1.4 var(--sans);
    color: var(--hi);
    background: var(--void);
    -webkit-user-select: none; user-select: none;
    -webkit-font-smoothing: antialiased;
  }
  .lab { font-family: var(--mono); font-size: 10px; letter-spacing: .24em; text-transform: uppercase; color: var(--low); font-weight: 400; }
  .mono { font-family: var(--mono); }
  .aqt { color: var(--aq); }

  #app { display: flex; height: 100%; background: var(--win); }
  button, input { font-family: inherit; }
  /* всё интерактивное — не перетаскивает окно */
  button, input, textarea, .sp, .spadd, .pin, #cmd, .tab, .qt, .qtt, #bigcmd, .sw, .sn, .sgi, .tgl, .srv, .nrow, #shield, .ic { -webkit-app-region: no-drag; }
  /* нативные кнопки окна macOS показываются в рейле — прячем свои точки */
  #rail .lights .dot { visibility: hidden; }

  /* ---- Рейл spaces ---- */
  #rail {
    width: 66px; flex: none; display: flex; flex-direction: column; align-items: center;
    padding: 18px 0 20px; -webkit-app-region: drag;
  }
  #rail .lights { display: flex; gap: 7px; margin-bottom: 30px; height: 12px; }
  #rail .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dr { background: #5e3a38; } .dy { background: #5e5138; } .dg { background: #3c5644; }
  .sp {
    width: 34px; height: 34px; border-radius: 10px; border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; letter-spacing: .05em; color: var(--mid);
    margin-bottom: 12px; cursor: default; transition: border-color .15s, color .15s, box-shadow .15s;
  }
  .sp:hover { color: var(--hi); border-color: var(--line-hi); }
  .sp.on { border-color: var(--aq); color: var(--aq); box-shadow: 0 0 22px color-mix(in srgb, var(--aq) 18%, transparent); }
  .spadd {
    width: 34px; height: 34px; border-radius: 10px; border: 1px dashed var(--line-hi);
    display: flex; align-items: center; justify-content: center; color: var(--low);
    cursor: default; transition: color .15s, border-color .15s;
  }
  .spadd:hover { color: var(--mid); border-color: var(--mid); }
  #rail .avat {
    width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--line-hi);
    display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600;
    color: var(--mid); margin-top: auto;
  }

  /* ---- Боковая панель ---- */
  #side { width: 238px; flex: none; padding: 20px 14px 16px; display: flex; flex-direction: column; -webkit-app-region: drag; }
  .shead { display: flex; align-items: baseline; justify-content: space-between; padding: 0 4px; margin-bottom: 16px; }
  .sname { font-size: 13px; font-weight: 600; letter-spacing: .16em; text-transform: uppercase; }
  #cmd {
    display: flex; align-items: center; gap: 9px; height: 36px; padding: 0 10px 0 12px;
    border: 1px solid var(--line); border-radius: 10px; color: var(--low); font-size: 12.5px;
    margin-bottom: 24px; cursor: text; transition: border-color .15s, color .15s;
  }
  #cmd:hover { border-color: var(--line-hi); color: var(--mid); }
  #cmd .key { margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--low); border: 1px solid var(--line-hi); border-radius: 5px; padding: 2px 5px; }
  .pins { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 12px 0 26px; }
  .pin {
    aspect-ratio: 1; border-radius: 11px; background: var(--fill); border: 1px solid var(--line-soft);
    display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #cfd3d0;
    cursor: default; transition: background .15s, border-color .15s;
  }
  .pin:hover { background: var(--fill-hi); border-color: var(--line-hi); }
  #tablist { display: flex; flex-direction: column; gap: 2px; margin-top: 12px; overflow-y: auto; }
  .tab {
    display: flex; align-items: center; gap: 10px; height: 34px; padding: 0 10px; border-radius: 9px;
    font-size: 13px; color: var(--mid); cursor: default; border: none; background: transparent; width: 100%; text-align: left;
    -webkit-app-region: no-drag; transition: background .14s, color .14s;
  }
  .tab:hover { background: var(--fill); color: var(--hi); }
  .tab.on { background: var(--fill-hi); color: var(--hi); }
  .fav {
    width: 18px; height: 18px; flex: none; border-radius: 5px; background: rgba(255,255,255,.08);
    display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: #cfd3d0; font-family: var(--mono);
  }
  .fav.load { border: 1.5px solid color-mix(in srgb, var(--aq) 30%, transparent); border-top-color: var(--aq); background: transparent; animation: spin .7s linear infinite; }
  .ttl { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tab .x { color: var(--low); font-size: 13px; opacity: 0; transition: opacity .14s; }
  .tab:hover .x { opacity: 1; }
  .tab .x:hover { color: var(--hi); }
  .live { width: 5px; height: 5px; border-radius: 50%; background: var(--aq); flex: none; }
  #newtabbtn {
    margin-top: auto; padding: 14px 6px 0; border-top: 1px solid var(--line-soft);
    display: flex; align-items: center; justify-content: space-between; color: var(--low); font-size: 12.5px;
    background: transparent; border-left: none; border-right: none; border-bottom: none; cursor: default; transition: color .15s;
  }
  #newtabbtn:hover { color: var(--mid); }

  /* ---- Область страницы ---- */
  #main { flex: 1; margin: 10px 10px 10px 0; background: var(--page); border: 1px solid var(--line-soft); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; position: relative; }
  #toolbar { height: 52px; flex: none; display: flex; align-items: center; gap: 8px; padding: 0 16px; border-bottom: 1px solid var(--line-soft); -webkit-app-region: drag; }
  .ic {
    width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
    color: var(--mid); flex: none; border: none; background: transparent; cursor: default; transition: background .14s, color .14s;
  }
  .ic:hover { background: var(--fill); color: var(--hi); }
  .ic:disabled { color: #3a3e3c; background: transparent; }
  .ic svg { width: 14px; height: 14px; }
  #urlwrap {
    flex: 1; max-width: 560px; margin: 0 auto; height: 32px; display: flex; align-items: center; gap: 8px;
    padding: 0 12px; border: 1px solid var(--line); border-radius: 9px; background: rgba(255,255,255,.02);
    transition: border-color .15s;
  }
  #urlwrap:focus-within { border-color: color-mix(in srgb, var(--aq) 50%, transparent); }
  #urlwrap .scheme { font-family: var(--mono); font-size: 11px; color: var(--aq); flex: none; }
  #url { flex: 1; border: none; outline: none; background: transparent; color: var(--mid); font-size: 12.5px; text-align: center; -webkit-user-select: text; user-select: text; }
  #url:focus { color: var(--hi); text-align: left; }
  #url::placeholder { color: var(--low); }
  /* щит = переключатель узла + индикатор туннеля */
  #shield {
    width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
    color: var(--mid); flex: none; border: none; background: transparent; cursor: default; transition: color .15s, background .15s;
  }
  #shield:hover { background: var(--fill); }
  #shield.protected { color: var(--aq); }
  #shield.paused { color: var(--bad); animation: pulse 1.1s ease-in-out infinite; }
  #shield svg { width: 14px; height: 14px; }

  #stage { flex: 1; position: relative; }
  /* сюда встаёт нативный слой страницы; панели ниже показываются, когда он спрятан */

  /* ---- Экран новой вкладки ---- */
  #newtab {
    position: absolute; inset: 0; display: none; flex-direction: column;
    background: radial-gradient(560px 300px at 50% 38%, color-mix(in srgb, var(--aq) 7%, transparent), transparent 70%);
  }
  #newtab.show { display: flex; }
  #newtab .ctr { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  #clock { font-size: 132px; font-weight: 200; letter-spacing: -.015em; line-height: 1; font-variant-numeric: tabular-nums; }
  #datel { margin-top: 18px; margin-bottom: 52px; }
  #bigcmd {
    width: 560px; max-width: 76%; height: 52px; display: flex; align-items: center; gap: 12px; padding: 0 12px 0 18px;
    border: 1px solid var(--line-hi); border-radius: 14px; background: rgba(255,255,255,.025); color: var(--low); font-size: 14px;
    box-shadow: 0 24px 60px rgba(0,0,0,.35); cursor: text; transition: border-color .15s;
  }
  #bigcmd:hover { border-color: color-mix(in srgb, var(--aq) 40%, transparent); }
  #bigcmd .key { margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--low); border: 1px solid var(--line-hi); border-radius: 5px; padding: 3px 6px; }
  #quick { display: flex; gap: 14px; margin-top: 60px; }
  .qt { width: 112px; display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: default; }
  .qtt { width: 52px; height: 52px; border-radius: 14px; background: var(--fill); border: 1px solid var(--line-soft); display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 600; color: #cfd3d0; transition: background .15s, border-color .15s; }
  .qt:hover .qtt { background: var(--fill-hi); border-color: var(--line-hi); }
  .qtn { font-size: 12px; color: var(--mid); }
  #wm { position: absolute; left: 24px; bottom: 18px; }

  /* ---- Настройки / серверы (aqua://settings) ---- */
  #settings { position: absolute; inset: 0; display: none; }
  #settings.show { display: flex; }
  #snav { width: 220px; flex: none; padding: 40px 0 0 40px; display: flex; flex-direction: column; gap: 2px; }
  .sn { height: 34px; display: flex; align-items: center; gap: 12px; padding: 0 12px; border-radius: 8px; font-size: 13.5px; color: var(--mid); cursor: default; border: none; background: transparent; text-align: left; transition: color .14s, background .14s; }
  .sn:hover { color: var(--hi); background: var(--fill); }
  .sn.on { color: var(--hi); }
  .snd { width: 3px; height: 14px; border-radius: 2px; background: transparent; flex: none; }
  .sn.on .snd { background: var(--aq); }
  #spane { flex: 1; padding: 40px 56px 40px 40px; max-width: 760px; overflow-y: auto; }
  .h1 { font-size: 40px; font-weight: 300; letter-spacing: -.01em; line-height: 1; margin: 0 0 36px; }
  .srow { display: flex; align-items: center; justify-content: space-between; gap: 40px; padding: 20px 0; border-bottom: 1px solid var(--line-soft); }
  .srt { font-size: 14px; margin-bottom: 5px; }
  .srd { font-size: 12.5px; color: var(--low); }
  .tgl { width: 38px; height: 22px; border-radius: 11px; background: rgba(255,255,255,.1); position: relative; flex: none; border: none; cursor: default; transition: background .18s; }
  .tgl.on { background: var(--aq); }
  .knob { position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; border-radius: 50%; background: var(--win); box-shadow: 0 1px 3px rgba(0,0,0,.4); transition: left .18s; }
  .tgl.on .knob { left: 18px; }
  .seg { display: flex; border: 1px solid var(--line-hi); border-radius: 9px; padding: 2px; font-size: 12px; }
  .sgi { padding: 5px 14px; border-radius: 7px; color: var(--low); cursor: default; }
  .sgi.on { background: var(--fill-hi); color: var(--hi); }
  .sws { display: flex; gap: 12px; align-items: center; }
  .sw { width: 22px; height: 22px; border-radius: 50%; flex: none; cursor: default; }
  .sw.on { box-shadow: 0 0 0 2px var(--page), 0 0 0 3.5px var(--aq); }

  /* серверы: строки-узлы в стиле настроек */
  #srvlist { display: flex; flex-direction: column; }
  .srv { display: flex; align-items: center; gap: 14px; padding: 16px 0; border-bottom: 1px solid var(--line-soft); }
  .srv .dot { width: 10px; height: 10px; border-radius: 50%; flex: none; }
  .srv .si { flex: 1; min-width: 0; }
  .srv .sl { font-size: 14px; margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .srv .sa { font-size: 12px; color: var(--low); font-family: var(--mono); }
  .srv .lat { font-size: 11.5px; color: var(--low); font-variant-numeric: tabular-nums; min-width: 54px; text-align: right; }
  .srv .lat.good { color: var(--aq); } .srv .lat.bad { color: var(--bad); }
  .srv .use { font-size: 12px; color: var(--low); border: 1px solid var(--line-hi); border-radius: 7px; padding: 5px 11px; cursor: default; background: transparent; transition: color .14s, border-color .14s; }
  .srv .use:hover { color: var(--hi); border-color: var(--mid); }
  .srv.on .use { color: var(--aq); border-color: color-mix(in srgb, var(--aq) 40%, transparent); }
  .srv .mini { width: 26px; height: 26px; border: none; background: transparent; color: var(--low); border-radius: 7px; cursor: default; font-size: 12px; }
  .srv .mini:hover { color: var(--hi); background: var(--fill); }
  .addsrv { margin-top: 22px; display: flex; gap: 10px; }
  .btn { height: 38px; padding: 0 16px; border: 1px solid var(--line-hi); border-radius: 9px; background: transparent; color: var(--hi); font-size: 12.5px; cursor: default; display: flex; align-items: center; gap: 7px; transition: background .14s, border-color .14s; }
  .btn:hover { background: var(--fill); }
  .btn.primary { background: var(--aq); color: #06110d; border-color: transparent; font-weight: 600; }
  .btn.primary:hover { filter: brightness(1.06); background: var(--aq); }
  .srvform { display: none; flex-direction: column; gap: 10px; margin-top: 18px; padding: 18px; border: 1px solid var(--line); border-radius: 12px; }
  .srvform.show { display: flex; }
  .frow { display: flex; gap: 10px; }
  .fld { flex: 1; display: flex; flex-direction: column; gap: 5px; }
  .fld label { font-size: 10px; font-family: var(--mono); letter-spacing: .1em; text-transform: uppercase; color: var(--low); }
  .fld input { height: 34px; padding: 0 11px; border-radius: 8px; background: var(--void); border: 1px solid var(--line); color: var(--hi); font-size: 12.5px; outline: none; -webkit-user-select: text; user-select: text; }
  .fld input:focus { border-color: color-mix(in srgb, var(--aq) 55%, transparent); }
  .fld input[type="color"] { width: 44px; flex: none; padding: 3px; cursor: default; }
  .ferr { font-size: 11.5px; color: var(--bad); min-height: 14px; }
  #paste { min-height: 66px; resize: vertical; padding: 10px; border-radius: 8px; background: var(--void); border: 1px solid var(--line); color: var(--hi); font-size: 12px; font-family: var(--mono); outline: none; -webkit-user-select: text; user-select: text; margin-top: 10px; }
  #paste:focus { border-color: color-mix(in srgb, var(--aq) 55%, transparent); }

  /* ---- Меню быстрого переключения узлов (из щита) ---- */
  #nodemenu {
    position: absolute; top: 50px; right: 14px; z-index: 40; width: 250px; padding: 6px;
    border-radius: 12px; background: #121415; border: 1px solid var(--line); box-shadow: 0 30px 70px rgba(0,0,0,.6);
    display: none;
  }
  #nodemenu.open { display: block; }
  .nrow { display: flex; align-items: center; gap: 10px; width: 100%; padding: 9px 10px; border: none; border-radius: 8px; background: transparent; color: var(--hi); font-size: 12.5px; cursor: default; text-align: left; transition: background .13s; }
  .nrow:hover { background: var(--fill-hi); }
  .nrow .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .nrow .nn { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .nrow .nl { font-size: 10.5px; color: var(--low); font-family: var(--mono); }
  .nrow.on .nn { color: var(--aq); }
  #nodemenu .nsep { height: 1px; margin: 5px 4px; background: var(--line-soft); }
  .nact { color: var(--mid); font-size: 12px; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 50% { opacity: .5; } }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
</style>
</head>
<body>
  <div id="app">
    <!-- рейл spaces -->
    <div id="rail">
      <div class="lights"><span class="dot dr"></span><span class="dot dy"></span><span class="dot dg"></span></div>
      <div class="sp on" title="Studio">ST</div>
      <div class="sp" title="Work">WK</div>
      <div class="sp" title="Private">PR</div>
      <div class="spadd" title="Новое пространство"><svg width="12" height="12" viewBox="0 0 12 12"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg></div>
      <div class="avat">MK</div>
    </div>

    <!-- боковая панель -->
    <div id="side">
      <div class="shead"><div class="sname">Studio</div><div class="lab" id="tabcount">01 / 01</div></div>
      <div id="cmd"><svg width="13" height="13" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="3.6" stroke="currentColor" stroke-width="1.3"/><path d="m9 9 3 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>Поиск…<span class="key">⌘K</span></div>
      <div class="lab">Закреплённые</div>
      <div class="pins" id="pins"></div>
      <div class="lab">Вкладки</div>
      <div id="tablist"></div>
      <button id="newtabbtn">Новая вкладка
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M7 3v8M3 7h8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      </button>
    </div>

    <!-- область страницы -->
    <div id="main">
      <div id="toolbar">
        <button class="ic" id="back" disabled><svg viewBox="0 0 14 14" fill="none"><path d="M9 2 4 7l5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <button class="ic" id="forward" disabled><svg viewBox="0 0 14 14" fill="none"><path d="m5 2 5 5-5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <button class="ic" id="reload"><svg viewBox="0 0 14 14" fill="none"><path d="M12 7a5 5 0 10-1.4 3.5M12 3v3h-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <div id="urlwrap">
          <span class="scheme" id="scheme">aqua://</span>
          <input id="url" type="text" placeholder="Поиск или адрес сайта" spellcheck="false" autocomplete="off" />
        </div>
        <span id="geo" class="lab" title="Где ваш трафик выходит в интернет" style="min-width:78px;text-align:right"></span>
        <button id="shield" class="protected" title="Активный сервер выхода — нажмите, чтобы переключить"><svg viewBox="0 0 14 14" fill="none"><path d="M7 1.5 12 3v4c0 3-2.2 5-5 6-2.8-1-5-3-5-6V3z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg></button>
      </div>

      <div id="stage">
        <!-- нативный слой страницы позиционируется сюда из main.js -->
        <div id="newtab">
          <div class="ctr">
            <div id="clock">00:00</div>
            <div class="lab" id="datel">—</div>
            <div id="bigcmd"><svg width="15" height="15" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="3.6" stroke="currentColor" stroke-width="1.3"/><path d="m9 9 3 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>Поиск, вопрос или адрес<span class="key">⌘K</span></div>
            <div id="quick"></div>
          </div>
          <div id="wm" class="lab">aqua — one</div>
        </div>

        <div id="settings">
          <div id="snav">
            <button class="sn" data-p="appearance"><span class="snd"></span>Оформление</button>
            <button class="sn on" data-p="servers"><span class="snd"></span>Серверы</button>
            <button class="sn" data-p="privacy"><span class="snd"></span>Приватность</button>
            <button class="sn" data-p="about"><span class="snd"></span>О программе</button>
          </div>
          <div id="spane"></div>
        </div>
      </div>

      <div id="nodemenu"></div>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
